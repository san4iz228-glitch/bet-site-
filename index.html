<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Parik Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Parik Demo</h1>

        <div id="auth">
            <input type="text" id="username" placeholder="Ім'я користувача">
            <button class="btn" onclick="register()">Зареєструватися</button>
            <button class="btn" onclick="login()">Увійти</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="header">
                <h2>Привіт, <span id="user-name"></span></h2>
                <p>Баланс: <span id="balance">0</span>$</p>
                <button class="btn small" onclick="logout()">Вийти</button>
            </div>

            <h3>Події</h3>
            <div id="events" class="events"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
